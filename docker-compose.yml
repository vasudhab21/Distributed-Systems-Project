services:
  redis:
    image: redis:7
    container_name: shardworld_redis
    ports:
      - "6379:6379"

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: shardworld_coordinator
    depends_on:
      - redis

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: shardworld_gateway
    depends_on:
      - redis
    ports:
      - "8080:8080"

  # ---------------- ZONE 0,0 ----------------
  zone-0-0-a:
    build: { context: ., dockerfile: Dockerfile.zone }
    container_name: shardworld_zone_0_0_a
    depends_on: [redis]
    environment:
      - REDIS_ADDR=redis:6379
      - ZONE_ID=zone_0_0
      - MIN_X=0
      - MAX_X=199
      - MIN_Y=0
      - MAX_Y=199

  zone-0-0-b:
    build: { context: ., dockerfile: Dockerfile.zone }
