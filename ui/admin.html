<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShardWorld Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Operations Console</p>
                <h1>ShardWorld Admin Panel</h1>
                <p class="subtitle">Monitor live players, custom names, and gateway events from one control surface.</p>
            </div>
            <div class="hero-actions">
                <a class="action-link" href="/">Open Player View</a>
            </div>
        </header>

        <section class="summary-grid">
            <article class="summary-card">
                <span class="summary-label">Players Online</span>
                <strong id="total-players" class="summary-value">0</strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">Active Zones</span>
                <strong id="active-zones" class="summary-value">0</strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">Gateway Feed</span>
                <strong id="feed-status" class="summary-value status-live">Connecting</strong>
            </article>
        </section>

        <section class="board-header">
            <div>
                <p class="eyebrow">Operations View</p>
                <h2>Live Monitor</h2>
            </div>
            <p id="last-updated" class="last-updated">Waiting for first snapshot...</p>
        </section>

        <section class="tab-strip">
            <button type="button" class="tab-button active" data-tab="players">Player Monitor</button>
            <button type="button" class="tab-button" data-tab="logs">Live Logs</button>
        </section>

        <section id="players-tab" class="tab-panel active">
            <section id="player-grid" class="player-grid"></section>
        </section>

        <section id="logs-tab" class="tab-panel">
            <div class="logs-panel">
                <div class="logs-header">
                    <div>
                        <p class="eyebrow">Gateway Events</p>
                        <h3>Live Logs</h3>
                    </div>
                </div>
                <div id="log-stream" class="log-stream"></div>
            </div>
        </section>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
