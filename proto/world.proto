syntax = "proto3";

package world;

option go_package = "shardworld/proto/worldpb";

service ZoneService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Move(MoveRequest) returns (MoveResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);

  // Gateway subscribes to live updates
  rpc StreamZoneUpdates(StreamRequest) returns (stream ZoneUpdate);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string reply = 1;
}

message JoinRequest {
  string player_id = 1;
  int32 x = 2;
  int32 y = 3;
}

message JoinResponse {
  int32 x = 1;
  int32 y = 2;
  bool is_leader = 3;
  string node_id = 4;
}

message MoveRequest {
  string player_id = 1;
  int32 dx = 2;
  int32 dy = 3;
}

message MoveResponse {
  int32 x = 1;
  int32 y = 2;
  bool is_leader = 3;
  string node_id = 4;
}

message GetStateRequest {
  string player_id = 1;
}

message GetStateResponse {
  int32 x = 1;
  int32 y = 2;
}

message StreamRequest {
  string zone_id = 1;
  int32 min_x = 2;
  int32 max_x = 3;
  int32 min_y = 4;
  int32 max_y = 5;
}


message ZoneUpdate {
  string player_id = 1;
  int32 x = 2;
  int32 y = 3;
}
